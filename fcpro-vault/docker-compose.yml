services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fcpro_vault
      POSTGRES_USER: fcpro_vault
      POSTGRES_PASSWORD: fcpro_vault_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcpro_vault -d fcpro_vault"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "fcpro_redis_password"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "fcpro_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgres://fcpro_vault:fcpro_vault_password@postgres:5432/fcpro_vault
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: fcpro_redis_password
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
